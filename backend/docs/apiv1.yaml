openapi: 3.1.0
info:
  title: Flashcards Trainer backend
  description: Flashcards Trainer backend
  version: 1.0.0
servers:
  - url: 'https://ft.iamamaev.ru'
  - url: 'http://localhost:8080'
paths:
  /api/v1/cards:
    post:
      description: Создать набор карточек
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCardSetRequest'
      responses:
        '201':
          description: Набор карточек создан
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    pattern: '^[A-Za-z0-9_-]{21}$'
                    minLength: 21
                    maxLength: 21


  /api/v1/cards/{id}:
    get:
      parameters:
        - name: session
          content:
            type: string
            pattern: '^[A-Za-z0-9_-]{21}$'
            minLength: 21
            maxLength: 21
      responses:
        '200':
          description: Вот набор карточек с таким айди
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardSet'
    # in future versions add PATCH behind auth cookie
    post:
      description: Начать сессию
      responses:
        '200':
          description: Вот держи твой айди сессии
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id:
                    type: string
                    pattern: '^[A-Za-z0-9_-]{21}$'
                    minLength: 21
                    maxLength: 21

  /api/v1/cards/{id}/{session_id}:
    post:
      description: получить следующую карточку
      responses:
        '200':
          description: карточка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'

    delete:
      description: пропустить текущую карточку и вернуть ее в конец очереди
      responses:
        '303':
          description: карточка пропущена, текущее состояние доступно по GET этого же ресурса

    get:
      description: получить прогресс сеанса и текущий вопрос
      responses:
        '200':
          description: держи
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CardSetMetadata'
                  - type: object
                    properties:
                      total:
                        type: integer

                      passed:
                        type: integer

                      card:
                        $ref: '#/components/schemas/Card'


components:
  schemas:
    CardData:
      type: object
      required:
        - question
        - answer
      properties:
        question:
          type: string

        answer:
          type: string

        remarks:
          type: string

    CardSetMetadata:
      type: object
      properties:
        title:
          type: string
          maxLength: 120
          description: Текст сохраняется после XSS-санитизации.

        description:
          type: string
          description: Текст сохраняется после XSS-санитизации.

        author:
          type: string
          description: Текст сохраняется после XSS-санитизации.

    CreateCardSetRequest:
      allOf:
        - $ref: '#/components/schemas/CardSetMetadata'
        - type: object
          required:
            - cards
          properties:
            cards:
              type: array
              minItems: 1
              items:
                $ref: '#/components/schemas/CardData'

    Card:
      type: object
      properties:
        id:
          type: string
          format: uuid
      allOf:
        - $ref: '#/components/schemas/CardData'

    CardSet:
      allOf:
        - type: object
          required:
            - id
            - cards
          properties:
            id:
              type: string
              pattern: '^[A-Za-z0-9_-]{21}$'
              minLength: 21
              maxLength: 21
            cards:
              type: array
              items:
                $ref: '#/components/schemas/Card'
        - $ref: '#/components/schemas/CardSetMetadata'
